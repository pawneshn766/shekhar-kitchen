<!DOCTYPE html>
<html>
<head>
    <title>Shekhar Kitchen</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f8f8f8;
        }

        header {
            background-color: orange;
            padding: 15px;
            font-size: 28px;
            color: white;
        }

        .item {
            border: 1px solid #ccc;
            margin: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }

        img {
            width: 200px;   /* yaha se photo choti hogi */
            height: 150px;
            border-radius: 10px;
        }

        .price {
            font-size: 20px;
            color: green;
        }

        button {
            padding: 10px 20px;
            background: orange;
            border: none;
            color: white;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<header>🍽️ Shekhar Kitchen</header>

<div class="item">
    <h2>Veg Thali</h2>
    <img src="veg.jpg">
    <p class="price">₹120</p>
    <button>Order Now</button>
</div>

<div class="item">
    <h2>Pizza</h2>
    <img src="pizza.jpg">
    <p class="price">₹150</p>
    <button>Order Now</button>
</div>

</body>
</html><img src="pizza.jpg">
